[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aorta4llm"
version = "0.1.0"
description = "Organizational reasoning for LLM agent systems"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
prolog = [
    "pyswip>=0.3.1",
]
dev = [
    "pytest>=7.0",
    "pyswip>=0.3.1",
]
dashboard = [
    "flask>=3.0",
]
orchestrator = [
    # Requires Claude Code CLI: npm install -g @anthropic-ai/claude-code
]

[project.scripts]
aorta = "cli.main:main"

[tool.hatch.build.targets.wheel]
packages = ["governance", "integration", "dashboard", "orchestrator", "cli"]

[tool.pytest.ini_options]
testpaths = ["governance/tests"]
