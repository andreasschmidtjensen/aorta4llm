<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AORTA Governance Dashboard</title>
<style>
  :root {
    --bg: #1a1b26; --surface: #24283b; --surface2: #2f3349;
    --text: #c0caf5; --dim: #565f89; --accent: #7aa2f7;
    --green: #9ece6a; --red: #f7768e; --amber: #e0af68; --blue: #7dcfff;
    --border: #3b4261;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text);
    font-size: 13px; line-height: 1.5;
  }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 15px; color: var(--accent); font-weight: 600; }
  header .org-name { color: var(--dim); font-size: 13px; }
  .stats {
    margin-left: auto; display: flex; gap: 16px; font-size: 12px;
  }
  .stats .stat { display: flex; align-items: center; gap: 4px; }
  .stats .approved { color: var(--green); }
  .stats .blocked { color: var(--red); }
  .stats .total { color: var(--dim); }

  .grid {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 49px);
  }

  .panel {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 10px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--dim); font-weight: 600;
  }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 8px;
  }

  /* Bottom bar with tabs */
  .bottom-bar {
    grid-column: 1 / -1;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    max-height: 220px;
  }
  .tab-bar {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 8px 16px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--dim); font-weight: 600;
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; padding: 10px 14px; overflow-y: auto; flex: 1; }
  .tab-content.active { display: block; }

  .norms-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .norm-tag {
    padding: 3px 8px; border-radius: 4px; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .norm-tag.forbidden { border-color: var(--red); color: var(--red); }
  .norm-tag.obliged { border-color: var(--blue); color: var(--blue); }

  /* Agent cards */
  .agent-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.selected { border-color: var(--accent); background: var(--surface2); }
  .agent-card .agent-id { font-weight: 600; color: var(--accent); }
  .agent-card .agent-role {
    font-size: 11px; display: inline-block;
    padding: 1px 6px; border-radius: 3px; margin-left: 6px;
    background: var(--surface2); color: var(--dim);
  }
  .agent-card .agent-scope {
    font-size: 11px; color: var(--dim); margin-top: 2px;
  }

  /* Role cards */
  .section-divider {
    padding: 10px 14px 4px; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--dim); font-weight: 600;
    border-top: 1px solid var(--border); margin-top: 4px;
  }
  .role-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; margin-bottom: 6px;
  }
  .role-card .role-name { font-weight: 600; color: var(--accent); font-size: 12px; }
  .role-card .role-norms-count {
    font-size: 10px; display: inline-block;
    padding: 0 5px; border-radius: 3px; margin-left: 6px;
    background: var(--surface2); color: var(--dim);
  }
  .role-card .role-objectives { font-size: 11px; color: var(--text); margin-top: 3px; }
  .role-card .role-capabilities { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* Event feed */
  .event {
    padding: 5px 10px; border-radius: 4px; margin-bottom: 3px;
    font-size: 12px; display: flex; align-items: baseline; gap: 8px;
  }
  .event:hover { background: var(--surface); }
  .event .ts { color: var(--dim); font-size: 10px; flex-shrink: 0; }
  .event .badge {
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; flex-shrink: 0;
  }
  .event .badge.approve { background: #1a3a1a; color: var(--green); }
  .event .badge.block { background: #3a1a1a; color: var(--red); }
  .event .badge.register { background: #1a2a3a; color: var(--blue); }
  .event .badge.activated { background: #1a2a3a; color: var(--blue); }
  .event .badge.fulfilled { background: #1a3a1a; color: var(--green); }
  .event .badge.violated { background: #3a2a1a; color: var(--amber); }
  .event .badge.phase_start { background: #2a1a3a; color: #bb9af7; }
  .event .badge.phase_complete { background: #1a3a2a; color: var(--green); }
  .event .badge.workflow { background: #2a2a1a; color: var(--amber); }
  .event .badge.agent_text { background: #1a2a2a; color: var(--blue); }
  .event .badge.agent_tool { background: #2a2a1a; color: var(--amber); }
  .event .badge.agent_turn { background: #1a2a1a; color: var(--dim); }
  .event.phase-marker {
    background: var(--surface); border-left: 3px solid #bb9af7;
    margin: 6px 0; font-weight: 600;
  }
  .event.workflow-marker {
    background: var(--surface); border-left: 3px solid var(--amber);
    margin: 6px 0; font-weight: 600;
  }
  .event .detail { color: var(--text); }
  .event .agent-ref { color: var(--accent); }
  .event .path-ref { color: var(--dim); }

  /* Obligations */
  .obligation {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  }
  .obligation.active { border-left: 3px solid var(--blue); }
  .obligation.fulfilled { border-left: 3px solid var(--green); opacity: 0.6; }
  .obligation.violated { border-left: 3px solid var(--amber); }
  .obligation .obl-agent { color: var(--accent); font-weight: 600; font-size: 12px; }
  .obligation .obl-deontic { color: var(--blue); font-size: 11px; }
  .obligation .obl-objective { color: var(--text); font-size: 12px; margin-top: 2px; }
  .obligation .obl-deadline { color: var(--dim); font-size: 11px; }

  .empty { color: var(--dim); font-size: 12px; padding: 20px; text-align: center; }

  /* Connection indicator */
  .conn { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .conn.connected { background: var(--green); }
  .conn.disconnected { background: var(--red); }

  /* Orchestrator panel */
  .orch-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
  .orch-field { display: flex; flex-direction: column; gap: 3px; }
  .orch-field label { font-size: 10px; text-transform: uppercase; color: var(--dim); letter-spacing: 0.05em; }
  .orch-field input, .orch-field select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 5px 8px; font-size: 12px; font-family: inherit;
  }
  .orch-field input:focus, .orch-field select:focus {
    outline: none; border-color: var(--accent);
  }
  .orch-field input.wide { width: 340px; }
  .orch-field input.med { width: 140px; }
  .orch-field input.narrow { width: 60px; }
  .orch-btn {
    padding: 5px 16px; border-radius: 4px; border: 1px solid var(--accent);
    background: transparent; color: var(--accent); cursor: pointer;
    font-size: 12px; font-family: inherit; font-weight: 600;
  }
  .orch-btn:hover { background: var(--accent); color: var(--bg); }
  .orch-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .orch-btn:disabled:hover { background: transparent; color: var(--accent); }
  .orch-status {
    font-size: 12px; margin-left: auto; display: flex; align-items: center; gap: 6px;
  }
  .orch-status .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .orch-status .dot.idle { background: var(--dim); }
  .orch-status .dot.running { background: var(--green); animation: pulse 1s infinite; }
  .orch-status .dot.complete { background: var(--green); }
  .orch-status .dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .phase-tracker {
    display: flex; gap: 4px; align-items: center; margin-top: 10px; font-size: 12px;
  }
  .phase-tracker .phase {
    padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    color: var(--dim); background: var(--bg);
  }
  .phase-tracker .phase.done { border-color: var(--green); color: var(--green); }
  .phase-tracker .phase.active { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
  .phase-tracker .arrow { color: var(--dim); }

  /* Agent detail panel */
  .detail-close-btn {
    background: none; border: none; color: var(--dim);
    font-size: 18px; cursor: pointer; padding: 0 4px;
    font-family: inherit; line-height: 1;
  }
  .detail-close-btn:hover { color: var(--red); }

  .agent-detail-item {
    padding: 4px 8px; margin-bottom: 2px; border-radius: 3px;
    font-size: 12px; line-height: 1.4;
  }
  .agent-detail-item.agent-text-item {
    color: var(--text); white-space: pre-wrap; word-break: break-word;
  }
  .agent-detail-item.agent-text-item .text-length {
    color: var(--dim); font-size: 10px;
  }
  .agent-detail-item.agent-tool-item {
    background: var(--surface); border-left: 2px solid var(--amber);
    padding-left: 10px;
  }
  .agent-detail-item .tool-name {
    color: var(--amber); font-weight: 600;
  }
  .agent-detail-item .tool-input {
    color: var(--dim); font-size: 11px; margin-top: 2px;
    white-space: pre-wrap; word-break: break-word;
    max-height: 60px; overflow: hidden;
  }
  .agent-detail-item.agent-check-item {
    background: var(--surface); border-left: 2px solid var(--green);
    padding-left: 10px;
  }
  .agent-detail-item.agent-check-item.blocked {
    border-left-color: var(--red);
  }
  .agent-detail-item.turn-divider {
    border-top: 1px solid var(--border);
    margin: 6px 0 4px;
    padding-top: 4px;
    color: var(--dim);
    font-size: 10px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <h1>AORTA</h1>
  <span class="org-name" id="org-name">loading...</span>
  <div class="stats">
    <div class="stat total">checks: <span id="stat-checks">0</span></div>
    <div class="stat approved">approved: <span id="stat-approved">0</span></div>
    <div class="stat blocked">blocked: <span id="stat-blocked">0</span></div>
    <span class="conn disconnected" id="conn" title="SSE connection"></span>
  </div>
</header>

<div class="grid">
  <!-- Left panel: Agents + Roles -->
  <div class="panel">
    <div class="panel-header">Agents</div>
    <div class="panel-body" id="left-panel">
      <div id="agents-panel">
        <div class="empty">No agents registered</div>
      </div>
      <div class="section-divider">Roles</div>
      <div id="roles-panel">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Center: Event feed -->
  <div class="panel">
    <div class="panel-header">Live Event Feed</div>
    <div class="panel-body" id="events-panel">
      <div class="empty">Waiting for events...</div>
    </div>
  </div>

  <!-- Right: Obligations / Agent Detail -->
  <div class="panel" style="border-right:none">
    <div id="obligations-view" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
      <div class="panel-header" style="flex-shrink:0;">Obligations</div>
      <div class="panel-body" id="obligations-panel" style="flex:1; overflow-y:auto;">
        <div class="empty">No active obligations</div>
      </div>
    </div>
    <div id="agent-detail-view" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center; flex-shrink:0;">
        <span>Agent: <span id="detail-agent-id" style="color:var(--accent)"></span>
          <span id="detail-agent-role" style="color:var(--dim); font-size:10px; margin-left:6px"></span>
        </span>
        <button class="detail-close-btn" onclick="closeAgentDetail()">&times;</button>
      </div>
      <div class="panel-body" id="agent-detail-panel" style="flex:1; overflow-y:auto;">
        <div class="empty">No output yet</div>
      </div>
    </div>
  </div>

  <!-- Bottom bar with tabs -->
  <div class="bottom-bar">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('norms')">Norms</button>
      <button class="tab-btn" onclick="switchTab('orchestrator')">Orchestrator</button>
    </div>
    <div class="tab-content active" id="tab-norms">
      <div class="norms-list" id="norms-list"></div>
    </div>
    <div class="tab-content" id="tab-orchestrator">
      <div class="orch-form" id="orch-form">
        <div class="orch-field">
          <label>Task</label>
          <input type="text" class="wide" id="orch-task" placeholder="Add a health check endpoint">
        </div>
        <div class="orch-field">
          <label>Project Dir</label>
          <input type="text" class="med" id="orch-project" placeholder="examples/health_check_project">
        </div>
        <div class="orch-field">
          <label>Scope</label>
          <input type="text" class="med" id="orch-scope" placeholder="src/health/">
        </div>
        <div class="orch-field">
          <label>Model</label>
          <select id="orch-model">
            <option value="sonnet">sonnet</option>
            <option value="haiku">haiku</option>
            <option value="opus">opus</option>
          </select>
        </div>
        <div class="orch-field">
          <label>Turns</label>
          <input type="number" class="narrow" id="orch-turns" value="10" min="1" max="50">
        </div>
        <button class="orch-btn" id="orch-start" onclick="startWorkflow()">Start Workflow</button>
        <div class="orch-status">
          <span class="dot idle" id="orch-dot"></span>
          <span id="orch-status-text">idle</span>
        </div>
      </div>
      <div class="phase-tracker" id="phase-tracker">
        <span class="phase" id="phase-architect">architect</span>
        <span class="arrow">&rarr;</span>
        <span class="phase" id="phase-implementer">implementer</span>
        <span class="arrow">&rarr;</span>
        <span class="phase" id="phase-reviewer">reviewer</span>
      </div>
    </div>
  </div>
</div>

<script>
const state = {
  agents: {},
  obligations: {},
  stats: { checks: 0, approved: 0, blocked: 0 },
  events: [],
  orgSpec: null,
  workflow: { status: 'idle', phases: {} },
  selectedAgent: null,
  agentEvents: {},
};

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderAgents() {
  const panel = document.getElementById('agents-panel');
  const agents = Object.values(state.agents);
  if (!agents.length) { panel.innerHTML = '<div class="empty">No agents registered</div>'; return; }
  panel.innerHTML = agents.map(a => {
    const sel = state.selectedAgent === a.agent ? ' selected' : '';
    return `
      <div class="agent-card${sel}" onclick="selectAgent('${esc(a.agent)}')">
        <span class="agent-id">${esc(a.agent)}</span>
        <span class="agent-role">${esc(a.role)}</span>
        <div class="agent-scope">${a.scope ? 'scope: ' + esc(a.scope) : 'unrestricted'}</div>
      </div>
    `;
  }).join('');
}

function renderRoles() {
  const panel = document.getElementById('roles-panel');
  if (!state.orgSpec || !state.orgSpec.roles) {
    panel.innerHTML = '<div class="empty">No roles defined</div>';
    return;
  }
  const roles = state.orgSpec.roles;
  const norms = state.orgSpec.norms || [];

  panel.innerHTML = Object.entries(roles).map(([name, role]) => {
    const roleNorms = norms.filter(n => n.role === name);
    const normsCount = roleNorms.length;
    const objectives = (role.objectives || []).map(o => `<div>&#8594; ${esc(o)}</div>`).join('');
    const caps = (role.capabilities || []).map(c => esc(c)).join(', ');
    return `
      <div class="role-card">
        <span class="role-name">${esc(name)}</span>
        ${normsCount ? `<span class="role-norms-count">${normsCount} norm${normsCount > 1 ? 's' : ''}</span>` : ''}
        <div class="role-objectives">${objectives}</div>
        <div class="role-capabilities">&#9670; ${caps}</div>
      </div>
    `;
  }).join('');
}

function renderObligations() {
  const panel = document.getElementById('obligations-panel');
  const obls = Object.values(state.obligations);
  if (!obls.length) { panel.innerHTML = '<div class="empty">No obligations</div>'; return; }
  panel.innerHTML = obls.map(o => `
    <div class="obligation ${o.status}">
      <div class="obl-agent">${esc(o.agent)}</div>
      <div class="obl-deontic">${esc(o.deontic)}</div>
      <div class="obl-objective">${esc(o.objective)}</div>
      <div class="obl-deadline">deadline: ${esc(o.deadline)}</div>
    </div>
  `).join('');
}

function renderStats() {
  document.getElementById('stat-checks').textContent = state.stats.checks;
  document.getElementById('stat-approved').textContent = state.stats.approved;
  document.getElementById('stat-blocked').textContent = state.stats.blocked;
}

// --- Agent detail panel ---

function selectAgent(agentId) {
  if (state.selectedAgent === agentId) {
    closeAgentDetail();
    return;
  }
  state.selectedAgent = agentId;
  document.getElementById('obligations-view').style.display = 'none';
  document.getElementById('agent-detail-view').style.display = 'flex';
  document.getElementById('detail-agent-id').textContent = agentId;
  const agent = state.agents[agentId];
  document.getElementById('detail-agent-role').textContent = agent ? agent.role : '';
  renderAgentDetail();
  renderAgents();
}

function closeAgentDetail() {
  state.selectedAgent = null;
  document.getElementById('agent-detail-view').style.display = 'none';
  document.getElementById('obligations-view').style.display = '';
  renderAgents();
}

function renderAgentDetail() {
  const panel = document.getElementById('agent-detail-panel');
  const agentId = state.selectedAgent;
  if (!agentId) return;

  const events = state.agentEvents[agentId] || [];
  if (!events.length) {
    panel.innerHTML = '<div class="empty">No output yet</div>';
    return;
  }

  panel.innerHTML = events.map(renderAgentDetailItem).filter(Boolean).join('');
  panel.scrollTop = panel.scrollHeight;
}

function renderAgentDetailItem(ev) {
  const ts = formatTime(ev.ts);

  if (ev.type === 'agent_text') {
    const lenNote = ev.length > 500 ? ` <span class="text-length">(${ev.length} chars)</span>` : '';
    return `<div class="agent-detail-item agent-text-item">
      <span class="ts">${ts}</span>${lenNote}<br>${esc(ev.text)}
    </div>`;
  }

  if (ev.type === 'agent_tool_call') {
    const inputPreview = ev.input_preview || '';
    // Try to extract file_path for a nicer display
    let pathNote = '';
    try {
      const inp = JSON.parse(ev.input_preview || '{}');
      if (inp.file_path) pathNote = esc(inp.file_path);
      else if (inp.command) pathNote = esc(inp.command.substring(0, 80));
      else if (inp.pattern) pathNote = esc(inp.pattern);
    } catch(e) {}
    return `<div class="agent-detail-item agent-tool-item">
      <span class="ts">${ts}</span>
      <span class="tool-name">${esc(ev.tool)}</span>
      ${pathNote ? ' <span style="color:var(--dim)">' + pathNote + '</span>' : ''}
      <div class="tool-input">${esc(inputPreview)}</div>
    </div>`;
  }

  if (ev.type === 'check') {
    const cls = ev.decision === 'approve' ? '' : ' blocked';
    const sym = ev.decision === 'approve' ? '\u2713' : '\u2717';
    return `<div class="agent-detail-item agent-check-item${cls}">
      <span class="ts">${ts}</span>
      ${sym} ${esc(ev.decision)} ${esc(ev.action)} <span style="color:var(--dim)">${esc(ev.path || '')}</span>
      ${ev.reason ? '<br><span style="color:var(--red);font-size:11px">' + esc(ev.reason) + '</span>' : ''}
    </div>`;
  }

  if (ev.type === 'agent_turn_complete') {
    return `<div class="agent-detail-item turn-divider">turn ${ev.turn} complete</div>`;
  }

  if (ev.type === 'norm_change') {
    return `<div class="agent-detail-item agent-check-item">
      <span class="ts">${ts}</span>
      norm ${esc(ev.change)}: ${esc(ev.deontic)} ${esc(ev.objective)}
    </div>`;
  }

  return '';
}

function appendAgentEvent(ev) {
  const agentId = ev.agent;
  if (!agentId) return;
  if (!state.agentEvents[agentId]) state.agentEvents[agentId] = [];
  state.agentEvents[agentId].push(ev);

  if (state.selectedAgent === agentId) {
    const panel = document.getElementById('agent-detail-panel');
    if (panel.querySelector('.empty')) panel.innerHTML = '';
    const html = renderAgentDetailItem(ev);
    if (html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      const child = div.firstElementChild;
      if (child) {
        panel.appendChild(child);
        panel.scrollTop = panel.scrollHeight;
      }
    }
  }
}

// --- Event feed ---

function addEventToFeed(ev) {
  const panel = document.getElementById('events-panel');
  if (panel.querySelector('.empty')) panel.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'event';

  const ts = formatTime(ev.ts);

  if (ev.type === 'check') {
    const badge = ev.decision === 'approve' ? 'approve' : 'block';
    const symbol = ev.decision === 'approve' ? '\u2713' : '\u2717';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge ${badge}">${symbol} ${esc(ev.decision)}</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">${esc(ev.action)}</span>
      <span class="path-ref">${esc(ev.path || '')}</span>
    `;
  } else if (ev.type === 'register') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge register">+ register</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">as ${esc(ev.role)}${ev.scope ? ' scope:' + esc(ev.scope) : ''}</span>
    `;
  } else if (ev.type === 'norm_change') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge ${esc(ev.change)}">${esc(ev.change)}</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
      <span class="detail">${esc(ev.deontic)} ${esc(ev.objective)}</span>
    `;
  } else if (ev.type === 'phase_start') {
    div.className = 'event phase-marker';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge phase_start">\u25B6 ${esc(ev.phase)}</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
      <span class="detail">${esc(ev.task || '')}</span>
    `;
  } else if (ev.type === 'phase_complete') {
    div.className = 'event phase-marker';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge phase_complete">\u2713 ${esc(ev.phase)} done</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
    `;
  } else if (ev.type === 'workflow_start') {
    div.className = 'event workflow-marker';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge workflow">\u25B6 workflow</span>
      <span class="detail">${esc(ev.task || '')}</span>
      <span class="path-ref">scope: ${esc(ev.scope || '')}</span>
    `;
  } else if (ev.type === 'workflow_complete') {
    div.className = 'event workflow-marker';
    const statusBadge = ev.status === 'success' ? 'phase_complete' : 'block';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge ${statusBadge}">\u2713 workflow ${esc(ev.status || '')}</span>
      <span class="detail">${esc(ev.error || '')}</span>
    `;
  } else if (ev.type === 'agent_text') {
    const preview = (ev.text || '').substring(0, 80);
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge agent_text">\u270E text</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">${esc(preview)}${ev.text && ev.text.length > 80 ? '...' : ''}</span>
    `;
  } else if (ev.type === 'agent_tool_call') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge agent_tool">\u2699 ${esc(ev.tool)}</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">${esc((ev.input_preview || '').substring(0, 60))}</span>
    `;
  } else if (ev.type === 'agent_turn_complete') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge agent_turn">\u21BA turn ${ev.turn}</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
    `;
  } else {
    return;
  }

  panel.prepend(div);
  while (panel.children.length > 200) panel.removeChild(panel.lastChild);
}

// --- State processing ---

function processEvent(ev) {
  state.events.push(ev);

  if (ev.type === 'register') {
    state.agents[ev.agent] = {
      agent: ev.agent, role: ev.role, scope: ev.scope || '', registered_at: ev.ts,
    };
    renderAgents();
  } else if (ev.type === 'check') {
    state.stats.checks++;
    if (ev.decision === 'approve') state.stats.approved++;
    else state.stats.blocked++;
    renderStats();
  } else if (ev.type === 'norm_change') {
    const key = `${ev.agent}:${ev.objective}`;
    if (ev.change === 'activated') {
      state.obligations[key] = {
        agent: ev.agent || '', deontic: ev.deontic || '', objective: ev.objective || '',
        deadline: ev.deadline || '', status: 'active', activated_at: ev.ts,
      };
    } else if (ev.change === 'fulfilled' || ev.change === 'violated') {
      if (state.obligations[key]) state.obligations[key].status = ev.change;
    }
    renderObligations();
  } else if (ev.type === 'phase_start') {
    updatePhaseTracker(ev.phase, 'active');
    state.workflow.status = 'running';
    updateWorkflowStatus();
  } else if (ev.type === 'phase_complete') {
    updatePhaseTracker(ev.phase, 'done');
  } else if (ev.type === 'workflow_start') {
    state.workflow.status = 'running';
    state.workflow.phases = {};
    resetPhaseTracker();
    updateWorkflowStatus();
  } else if (ev.type === 'workflow_complete') {
    state.workflow.status = ev.status === 'success' ? 'complete' : 'error';
    updateWorkflowStatus();
  }

  // Route agent-detail events only to per-agent store (not the main feed)
  const agentDetailTypes = ['agent_text', 'agent_tool_call', 'agent_turn_complete'];
  if (ev.agent && agentDetailTypes.includes(ev.type)) {
    appendAgentEvent(ev);
    return;
  }

  // Route check/norm_change to both per-agent store and main feed
  if (ev.agent) {
    const sharedTypes = ['check', 'norm_change'];
    if (sharedTypes.includes(ev.type)) {
      appendAgentEvent(ev);
    }
  }

  addEventToFeed(ev);
}

// --- Tab switching ---

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// --- Orchestrator ---

async function startWorkflow() {
  const task = document.getElementById('orch-task').value.trim();
  const projectDir = document.getElementById('orch-project').value.trim();
  const scope = document.getElementById('orch-scope').value.trim();
  const model = document.getElementById('orch-model').value;
  const maxTurns = parseInt(document.getElementById('orch-turns').value) || 10;

  if (!task || !scope) { alert('Task and scope are required'); return; }

  document.getElementById('orch-start').disabled = true;
  state.workflow.status = 'running';
  state.workflow.phases = {};
  state.agentEvents = {};
  state.selectedAgent = null;
  closeAgentDetail();
  resetPhaseTracker();
  updateWorkflowStatus();

  try {
    const resp = await fetch('/api/workflow/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task, scope, model, max_turns: maxTurns, project_dir: projectDir }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      alert(data.error || 'Failed to start workflow');
      state.workflow.status = 'error';
      updateWorkflowStatus();
      document.getElementById('orch-start').disabled = false;
      return;
    }
    pollWorkflowStatus();
  } catch (e) {
    alert('Failed to start workflow: ' + e.message);
    state.workflow.status = 'error';
    updateWorkflowStatus();
    document.getElementById('orch-start').disabled = false;
  }
}

function pollWorkflowStatus() {
  const interval = setInterval(async () => {
    try {
      const resp = await fetch('/api/workflow/status');
      const data = await resp.json();
      if (data.status !== 'running') {
        state.workflow.status = data.status;
        if (data.error) state.workflow.error = data.error;
        updateWorkflowStatus();
        document.getElementById('orch-start').disabled = false;
        clearInterval(interval);
      }
    } catch (e) { /* ignore poll errors */ }
  }, 2000);
}

function updateWorkflowStatus() {
  const dot = document.getElementById('orch-dot');
  const text = document.getElementById('orch-status-text');
  dot.className = 'dot ' + state.workflow.status;
  text.textContent = state.workflow.status;
  if (state.workflow.status === 'error' && state.workflow.error) {
    text.textContent = 'error: ' + state.workflow.error;
  }
}

function updatePhaseTracker(phase, status) {
  state.workflow.phases[phase] = status;
  const el = document.getElementById('phase-' + phase);
  if (el) {
    el.className = 'phase ' + status;
  }
}

function resetPhaseTracker() {
  ['architect', 'implementer', 'reviewer'].forEach(p => {
    const el = document.getElementById('phase-' + p);
    if (el) el.className = 'phase';
  });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Load initial state
async function init() {
  try {
    const spec = await (await fetch('/api/org-spec')).json();
    state.orgSpec = spec;
    document.getElementById('org-name').textContent = spec.organization || 'unknown';

    const normsList = document.getElementById('norms-list');
    (spec.norms || []).forEach(n => {
      const tag = document.createElement('span');
      tag.className = `norm-tag ${n.type}`;
      const cond = n.condition ? ` when ${n.condition}` : '';
      tag.textContent = `${n.role}: ${n.type} ${n.objective}${cond}`;
      normsList.appendChild(tag);
    });

    renderRoles();
  } catch (e) { console.error('Failed to load org spec', e); }

  try {
    const events = await (await fetch('/api/events?limit=200')).json();
    events.forEach(processEvent);
  } catch (e) { console.error('Failed to load events', e); }

  try {
    const resp = await fetch('/api/workflow/status');
    const data = await resp.json();
    if (data.status === 'running') {
      state.workflow.status = 'running';
      updateWorkflowStatus();
      document.getElementById('orch-start').disabled = true;
      pollWorkflowStatus();
    }
  } catch (e) { /* ignore */ }

  connectSSE();
}

function connectSSE() {
  const conn = document.getElementById('conn');
  const es = new EventSource('/api/events/stream');

  es.onopen = () => { conn.className = 'conn connected'; conn.title = 'Connected'; };
  es.onerror = () => { conn.className = 'conn disconnected'; conn.title = 'Disconnected \u2014 reconnecting...'; };

  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      processEvent(ev);
    } catch (err) { console.error('SSE parse error', err); }
  };
}

init();
</script>
