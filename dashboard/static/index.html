<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AORTA Governance Dashboard</title>
<style>
  :root {
    --bg: #1a1b26; --surface: #24283b; --surface2: #2f3349;
    --text: #c0caf5; --dim: #565f89; --accent: #7aa2f7;
    --green: #9ece6a; --red: #f7768e; --amber: #e0af68; --blue: #7dcfff;
    --border: #3b4261;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg); color: var(--text);
    font-size: 13px; line-height: 1.5;
  }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 15px; color: var(--accent); font-weight: 600; }
  header .org-name { color: var(--dim); font-size: 13px; }
  .stats {
    margin-left: auto; display: flex; gap: 16px; font-size: 12px;
  }
  .stats .stat { display: flex; align-items: center; gap: 4px; }
  .stats .approved { color: var(--green); }
  .stats .blocked { color: var(--red); }
  .stats .total { color: var(--dim); }

  .grid {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    grid-template-rows: 1fr auto;
    height: calc(100vh - 49px);
  }

  .panel {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel:last-child { border-right: none; }
  .panel-header {
    padding: 10px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--dim); font-weight: 600;
  }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 8px;
  }

  .norms-bar {
    grid-column: 1 / -1;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 14px; overflow-x: auto;
  }
  .norms-bar .panel-header {
    background: none; border: none; padding: 0 0 6px 0;
  }
  .norms-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .norm-tag {
    padding: 3px 8px; border-radius: 4px; font-size: 11px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .norm-tag.forbidden { border-color: var(--red); color: var(--red); }
  .norm-tag.obliged { border-color: var(--blue); color: var(--blue); }

  /* Agent cards */
  .agent-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  }
  .agent-card .agent-id { font-weight: 600; color: var(--accent); }
  .agent-card .agent-role {
    font-size: 11px; display: inline-block;
    padding: 1px 6px; border-radius: 3px; margin-left: 6px;
    background: var(--surface2); color: var(--dim);
  }
  .agent-card .agent-scope {
    font-size: 11px; color: var(--dim); margin-top: 2px;
  }

  /* Event feed */
  .event {
    padding: 5px 10px; border-radius: 4px; margin-bottom: 3px;
    font-size: 12px; display: flex; align-items: baseline; gap: 8px;
  }
  .event:hover { background: var(--surface); }
  .event .ts { color: var(--dim); font-size: 10px; flex-shrink: 0; }
  .event .badge {
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
    font-weight: 600; flex-shrink: 0;
  }
  .event .badge.approve { background: #1a3a1a; color: var(--green); }
  .event .badge.block { background: #3a1a1a; color: var(--red); }
  .event .badge.register { background: #1a2a3a; color: var(--blue); }
  .event .badge.activated { background: #1a2a3a; color: var(--blue); }
  .event .badge.fulfilled { background: #1a3a1a; color: var(--green); }
  .event .badge.violated { background: #3a2a1a; color: var(--amber); }
  .event .badge.phase_start { background: #2a1a3a; color: #bb9af7; }
  .event .badge.phase_complete { background: #1a3a2a; color: var(--green); }
  .event .badge.handoff { background: #2a2a1a; color: var(--amber); }
  .event.phase-marker {
    background: var(--surface); border-left: 3px solid #bb9af7;
    margin: 6px 0; font-weight: 600;
  }
  .event .detail { color: var(--text); }
  .event .agent-ref { color: var(--accent); }
  .event .path-ref { color: var(--dim); }

  /* Obligations */
  .obligation {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
  }
  .obligation.active { border-left: 3px solid var(--blue); }
  .obligation.fulfilled { border-left: 3px solid var(--green); opacity: 0.6; }
  .obligation.violated { border-left: 3px solid var(--amber); }
  .obligation .obl-agent { color: var(--accent); font-weight: 600; font-size: 12px; }
  .obligation .obl-deontic { color: var(--blue); font-size: 11px; }
  .obligation .obl-objective { color: var(--text); font-size: 12px; margin-top: 2px; }
  .obligation .obl-deadline { color: var(--dim); font-size: 11px; }

  .empty { color: var(--dim); font-size: 12px; padding: 20px; text-align: center; }

  /* Connection indicator */
  .conn { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .conn.connected { background: var(--green); }
  .conn.disconnected { background: var(--red); }
</style>
</head>
<body>

<header>
  <h1>AORTA</h1>
  <span class="org-name" id="org-name">loading...</span>
  <div class="stats">
    <div class="stat total">checks: <span id="stat-checks">0</span></div>
    <div class="stat approved">approved: <span id="stat-approved">0</span></div>
    <div class="stat blocked">blocked: <span id="stat-blocked">0</span></div>
    <span class="conn disconnected" id="conn" title="SSE connection"></span>
  </div>
</header>

<div class="grid">
  <div class="panel">
    <div class="panel-header">Agents</div>
    <div class="panel-body" id="agents-panel">
      <div class="empty">No agents registered</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">Live Event Feed</div>
    <div class="panel-body" id="events-panel">
      <div class="empty">Waiting for events...</div>
    </div>
  </div>

  <div class="panel" style="border-right:none">
    <div class="panel-header">Obligations</div>
    <div class="panel-body" id="obligations-panel">
      <div class="empty">No active obligations</div>
    </div>
  </div>

  <div class="norms-bar">
    <div class="panel-header">Organizational Norms</div>
    <div class="norms-list" id="norms-list"></div>
  </div>
</div>

<script>
const state = {
  agents: {},
  obligations: {},
  stats: { checks: 0, approved: 0, blocked: 0 },
  events: [],
};

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderAgents() {
  const panel = document.getElementById('agents-panel');
  const agents = Object.values(state.agents);
  if (!agents.length) { panel.innerHTML = '<div class="empty">No agents registered</div>'; return; }
  panel.innerHTML = agents.map(a => `
    <div class="agent-card">
      <span class="agent-id">${esc(a.agent)}</span>
      <span class="agent-role">${esc(a.role)}</span>
      <div class="agent-scope">${a.scope ? 'scope: ' + esc(a.scope) : 'unrestricted'}</div>
    </div>
  `).join('');
}

function renderObligations() {
  const panel = document.getElementById('obligations-panel');
  const obls = Object.values(state.obligations);
  if (!obls.length) { panel.innerHTML = '<div class="empty">No obligations</div>'; return; }
  panel.innerHTML = obls.map(o => `
    <div class="obligation ${o.status}">
      <div class="obl-agent">${esc(o.agent)}</div>
      <div class="obl-deontic">${esc(o.deontic)}</div>
      <div class="obl-objective">${esc(o.objective)}</div>
      <div class="obl-deadline">deadline: ${esc(o.deadline)}</div>
    </div>
  `).join('');
}

function renderStats() {
  document.getElementById('stat-checks').textContent = state.stats.checks;
  document.getElementById('stat-approved').textContent = state.stats.approved;
  document.getElementById('stat-blocked').textContent = state.stats.blocked;
}

function addEventToFeed(ev) {
  const panel = document.getElementById('events-panel');
  if (panel.querySelector('.empty')) panel.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'event';

  const ts = formatTime(ev.ts);

  if (ev.type === 'check') {
    const badge = ev.decision === 'approve' ? 'approve' : 'block';
    const symbol = ev.decision === 'approve' ? '✓' : '✗';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge ${badge}">${symbol} ${esc(ev.decision)}</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">${esc(ev.action)}</span>
      <span class="path-ref">${esc(ev.path || '')}</span>
    `;
  } else if (ev.type === 'register') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge register">+ register</span>
      <span class="agent-ref">${esc(ev.agent)}</span>
      <span class="detail">as ${esc(ev.role)}${ev.scope ? ' scope:' + esc(ev.scope) : ''}</span>
    `;
  } else if (ev.type === 'norm_change') {
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge ${esc(ev.change)}">${esc(ev.change)}</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
      <span class="detail">${esc(ev.deontic)} ${esc(ev.objective)}</span>
    `;
  } else if (ev.type === 'phase_start') {
    div.className = 'event phase-marker';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge phase_start">▶ ${esc(ev.phase)}</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
      <span class="detail">${esc(ev.task || '')}</span>
    `;
  } else if (ev.type === 'phase_complete') {
    div.className = 'event phase-marker';
    div.innerHTML = `
      <span class="ts">${ts}</span>
      <span class="badge phase_complete">✓ ${esc(ev.phase)} done</span>
      <span class="agent-ref">${esc(ev.agent || '')}</span>
    `;
  }

  panel.prepend(div);

  // Keep max 200 events in DOM
  while (panel.children.length > 200) panel.removeChild(panel.lastChild);
}

function processEvent(ev) {
  state.events.push(ev);

  if (ev.type === 'register') {
    state.agents[ev.agent] = {
      agent: ev.agent, role: ev.role, scope: ev.scope || '', registered_at: ev.ts,
    };
    renderAgents();
  } else if (ev.type === 'check') {
    state.stats.checks++;
    if (ev.decision === 'approve') state.stats.approved++;
    else state.stats.blocked++;
    renderStats();
  } else if (ev.type === 'norm_change') {
    const key = `${ev.agent}:${ev.objective}`;
    if (ev.change === 'activated') {
      state.obligations[key] = {
        agent: ev.agent || '', deontic: ev.deontic || '', objective: ev.objective || '',
        deadline: ev.deadline || '', status: 'active', activated_at: ev.ts,
      };
    } else if (ev.change === 'fulfilled' || ev.change === 'violated') {
      if (state.obligations[key]) state.obligations[key].status = ev.change;
    }
    renderObligations();
  }

  addEventToFeed(ev);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// Load initial state
async function init() {
  // Load org spec for norms display
  try {
    const spec = await (await fetch('/api/org-spec')).json();
    document.getElementById('org-name').textContent = spec.organization || 'unknown';

    const normsList = document.getElementById('norms-list');
    (spec.norms || []).forEach(n => {
      const tag = document.createElement('span');
      tag.className = `norm-tag ${n.type}`;
      const cond = n.condition ? ` when ${n.condition}` : '';
      tag.textContent = `${n.role}: ${n.type} ${n.objective}${cond}`;
      normsList.appendChild(tag);
    });
  } catch (e) { console.error('Failed to load org spec', e); }

  // Load existing events
  try {
    const events = await (await fetch('/api/events?limit=200')).json();
    events.forEach(processEvent);
  } catch (e) { console.error('Failed to load events', e); }

  // Start SSE
  connectSSE();
}

function connectSSE() {
  const conn = document.getElementById('conn');
  const es = new EventSource('/api/events/stream');

  es.onopen = () => { conn.className = 'conn connected'; conn.title = 'Connected'; };
  es.onerror = () => { conn.className = 'conn disconnected'; conn.title = 'Disconnected — reconnecting...'; };

  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      processEvent(ev);
    } catch (err) { console.error('SSE parse error', err); }
  };
}

init();
</script>
</body>
</html>
