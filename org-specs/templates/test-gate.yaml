# test-gate.yaml — Single agent that cannot commit until tests pass.
#
# The agent can read and write freely, but `git commit` is blocked until
# a test runner (pytest, npm test, etc.) exits with code 0. The PostToolUse
# hook detects test success automatically and unlocks the gate.
#
# Usage:
#   aorta init --template test-gate --scope src/

organization: test_gate
bash_analysis: true
safe_commands: ["pytest", "git status", "git diff", "git log", "npm test"]

roles:
  agent:
    objectives:
      - tests_passing
      - task_complete
    capabilities:
      - read_file
      - write_file
      - execute_command

norms:
  # Block git commit until tests_passing is achieved.
  # The achievement_triggers section below fires when pytest exits 0.
  - role: agent
    type: required_before
    blocks: execute_command
    command_pattern: "git commit"
    requires: tests_passing

  # Also block git push until tests pass (optional — remove if unwanted).
  - role: agent
    type: required_before
    blocks: execute_command
    command_pattern: "git push"
    requires: tests_passing

# Automatically mark tests_passing when a test runner exits successfully.
# reset_on_file_change: any Write/Edit clears the achievement, requiring re-test.
achievement_triggers:
  - tool: Bash
    command_pattern: "pytest|python -m pytest|uv run pytest"
    exit_code: 0
    marks: tests_passing
    reset_on_file_change: true

  - tool: Bash
    command_pattern: "npm test|yarn test|pnpm test"
    exit_code: 0
    marks: tests_passing
    reset_on_file_change: true

  - tool: Bash
    command_pattern: "cargo test|go test"
    exit_code: 0
    marks: tests_passing
    reset_on_file_change: true
