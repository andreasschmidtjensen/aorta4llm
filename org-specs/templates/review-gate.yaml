# review-gate.yaml — Two-agent workflow: implementer + reviewer.
#
# The implementer writes code within a defined scope. The reviewer reads
# everything but cannot touch source files. The implementer cannot push
# until the reviewer has written a review document.
#
# Usage:
#   aorta init --template review-gate --scope src/ --agent impl-1
#   aorta hook register --org-spec .aorta/review-gate.yaml \
#       --agent rev-1 --role reviewer

organization: review_gate
bash_analysis: true

roles:
  implementer:
    objectives:
      - feature_implemented
      - tests_passing
    capabilities:
      - read_file
      - write_file
      - execute_command

  reviewer:
    objectives:
      - review_complete
    capabilities:
      - read_file
      - write_file   # write_file for the review doc; source files blocked below

dependencies:
  - role: reviewer
    depends_on: implementer
    for: feature_implemented

norms:
  # Implementer: only write within assigned scope.
  - role: implementer
    type: scope
    paths:
      - src/

  # Implementer: cannot push until tests pass.
  - role: implementer
    type: required_before
    blocks: execute_command
    command_pattern: "git push"
    requires: tests_passing

  # Implementer: cannot push until review is complete.
  - role: implementer
    type: required_before
    blocks: execute_command
    command_pattern: "git push"
    requires: review_complete

  # Reviewer: cannot modify source code.
  - role: reviewer
    type: forbidden_paths
    paths:
      - src/

  # Reviewer: must write a review document (obliged).
  - role: reviewer
    type: obliged
    objective: review_complete
    deadline: review_deadline
    condition: feature_implemented

rules:
  - "feature_implemented :- achieved(feature_implemented)."
  - "tests_passing :- achieved(tests_passing)."
  - "review_complete :- achieved(review_complete)."

achievement_triggers:
  - tool: Bash
    command_pattern: "pytest|python -m pytest|uv run pytest"
    exit_code: 0
    marks: tests_passing

  - tool: Bash
    command_pattern: "npm test|yarn test"
    exit_code: 0
    marks: tests_passing

workflow:
  - agent: impl-1
    role: implementer
    scope: "{scope}"
    prompt: "Implement: {task}. Write code in '{scope}', write tests, and run them. Make sure tests pass."
    achievements:
      - feature_implemented
      - tests_passing

  - agent: rev-1
    role: reviewer
    prompt: "Review the implementation of: {task}. The implementation output is in the previous step. Read the source code, check for correctness and style. Write your review to docs/review_{feature}.md."
    achievements:
      - review_complete
