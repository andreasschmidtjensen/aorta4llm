# safe-agent.yaml — Single governed agent with protected directories.
#
# Use this when you want a single Claude agent to work freely within a
# defined scope but be physically blocked from touching sensitive files.
#
# Usage:
#   aorta init --template safe-agent --scope src/

organization: safe_agent
bash_analysis: true

roles:
  agent:
    objectives:
      - task_complete
    capabilities:
      - read_file
      - write_file
      - execute_command

norms:
  # Block writes outside the assigned scope (set at registration time).
  # Change 'src/' to the directory you want the agent to work in.
  - role: agent
    type: scope
    paths:
      - src/

  # Block reads AND writes to secrets and sensitive files.
  - role: agent
    type: protected
    paths:
      - .env
      - .env.local
      - secrets/
      - .ssh/

  # Block writes to configuration (readable but not writable).
  - role: agent
    type: readonly
    paths:
      - config/

  # Soft-block git commit/push (agent must confirm with user).
  - role: agent
    type: forbidden_command
    command_pattern: "git commit"
    severity: soft

  - role: agent
    type: forbidden_command
    command_pattern: "git push"
    severity: soft
